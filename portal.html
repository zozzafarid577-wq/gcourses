<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal — Gcourses</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/gcourses-logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,400;0,600;1,400&family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/gc-experience.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --purple:#a0509f; --lavender:#dab5d5; --blush:#f3e7f3;
      --deep:#3b1a3a; --mid:#6b3569; --text:#2e1a2e;
      --muted:#8a6a88; --white:#fdfafd; --line:rgba(218,181,213,.4);
      --ok:#3f9d6b; --err:#c0506a;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:'Montserrat',system-ui,sans-serif;background:var(--blush);color:var(--text);min-height:100vh}
    a{color:var(--purple)}
    button{font-family:inherit}

    /* ---------- loading ---------- */
    #boot{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;background:var(--blush);z-index:600}
    .spinner{width:34px;height:34px;border:3px solid var(--lavender);border-top-color:var(--purple);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    .btn{display:inline-block;background:var(--purple);color:#fff;border:none;border-radius:100px;padding:.7rem 1.5rem;font-size:.9rem;font-weight:500;cursor:pointer;text-decoration:none;transition:.2s}
    .btn:hover{background:var(--mid)}
    .btn:disabled{opacity:.6;cursor:default}
    .btn.ghost{background:transparent;color:var(--purple);border:1.5px solid var(--lavender)}
    .btn.ghost:hover{background:var(--blush);color:var(--mid)}
    .btn.sm{padding:.4rem .85rem;font-size:.8rem}

    /* ---------- auth ---------- */
    #auth{display:none;min-height:100vh;align-items:center;justify-content:center;padding:2rem 1rem}
    .auth-card{width:100%;max-width:400px;background:var(--white);border-radius:22px;box-shadow:0 14px 50px rgba(160,80,159,.14);overflow:hidden}
    .auth-logo{text-align:center;padding:1.8rem 2rem .6rem}
    .auth-logo img{height:42px}
    .auth-logo .sub{font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-top:.5rem}
    .auth-tabs{display:flex;border-bottom:1px solid var(--line);margin-top:1rem}
    .auth-tab{flex:1;padding:.9rem;font-size:.82rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;background:none;border:none;cursor:pointer;color:var(--muted)}
    .auth-tab.active{color:var(--purple);border-bottom:2px solid var(--purple);margin-bottom:-1px}
    .auth-body{padding:1.8rem 2rem 2rem}
    .auth-body h2{font-family:'Lato',serif;font-weight:600;font-size:1.5rem;color:var(--deep);margin-bottom:.3rem}
    .auth-body p.lead{font-size:.86rem;color:var(--muted);margin-bottom:1.4rem;line-height:1.5}
    .field{margin-bottom:1rem}
    .field label{display:block;font-size:.74rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem}
    .field input{width:100%;padding:.75rem 1rem;border:1.5px solid var(--lavender);border-radius:10px;font-family:inherit;font-size:.95rem;color:var(--text);background:var(--white);outline:none}
    .field input:focus{border-color:var(--purple)}
    .auth-btn{width:100%;padding:.85rem;border-radius:100px;border:none;background:var(--purple);color:#fff;font-size:.92rem;font-weight:600;cursor:pointer;margin-top:.3rem}
    .auth-btn:hover{background:var(--mid)}
    .auth-btn:disabled{opacity:.6;cursor:default}
    .auth-msg{margin-top:1rem;font-size:.85rem;padding:.7rem .9rem;border-radius:10px;display:none}
    .auth-msg.err{display:block;background:rgba(192,80,106,.1);color:#7d2c40}
    .auth-msg.ok{display:block;background:rgba(63,157,107,.12);color:#1f5e3f}
    .auth-foot{text-align:center;margin-top:1.4rem;font-size:.82rem;color:var(--muted)}
    .auth-foot a{cursor:pointer}

    /* ---------- shell ---------- */
    #app{display:none;min-height:100vh}
    .topbar{position:sticky;top:0;z-index:120;display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:.7rem 1.4rem;background:rgba(253,250,253,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
    .topbar .brand{display:flex;align-items:center;gap:.7rem}
    .topbar .brand img{height:30px}
    .topbar .brand .sub{font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
    .topbar .tools{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap}
    .who{font-size:.8rem;color:var(--muted)}
    .badge{font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;background:var(--purple);color:#fff;padding:.2rem .5rem;border-radius:100px;font-weight:600}

    .layout{display:grid;grid-template-columns:320px 1fr;gap:0;min-height:calc(100vh - 60px)}
    .side{border-right:1px solid var(--line);background:var(--white);padding:1.2rem;overflow-y:auto;max-height:calc(100vh - 60px);position:sticky;top:60px}
    .side h1{font-family:'Lato',serif;font-size:1.5rem;font-weight:600;color:var(--deep);line-height:1.2;margin-bottom:.3rem}
    .side .intro{font-size:.82rem;color:var(--muted);line-height:1.5;margin-bottom:1rem}
    .progress-wrap{margin:0 0 1.2rem}
    .progress-bar{height:8px;background:var(--blush);border-radius:100px;overflow:hidden}
    .progress-bar span{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--purple),var(--lavender));border-radius:100px;transition:width .4s}
    .progress-label{font-size:.74rem;color:var(--muted);margin-top:.4rem}

    .module{margin-bottom:.5rem;border:1px solid var(--line);border-radius:14px;overflow:hidden;background:var(--white)}
    .module-head{display:flex;align-items:center;gap:.5rem;padding:.7rem .85rem;cursor:pointer;user-select:none}
    .module-head:hover{background:var(--blush)}
    .module-head .mtitle{flex:1;font-weight:600;font-size:.92rem;color:var(--deep)}
    .module-head .chev{color:var(--muted);transition:transform .2s}
    .module.collapsed .chev{transform:rotate(-90deg)}
    .module.collapsed .lessons{display:none}
    .mcount{font-size:.7rem;color:var(--muted)}
    .lessons{padding:.2rem .4rem .5rem;display:flex;flex-direction:column;gap:2px}
    .lesson{display:flex;align-items:center;gap:.55rem;padding:.5rem .6rem;border-radius:9px;cursor:pointer;font-size:.86rem;color:var(--text)}
    .lesson:hover{background:var(--blush)}
    .lesson.active{background:var(--blush);box-shadow:inset 3px 0 0 var(--purple)}
    .lesson .tick{width:18px;height:18px;border-radius:50%;border:2px solid var(--lavender);flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:.66rem;color:#fff;background:transparent}
    .lesson.done .tick{background:var(--ok);border-color:var(--ok)}
    .lesson .ltype{font-size:.62rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);flex:0 0 auto}
    .lesson .ltitle{flex:1;line-height:1.25}

    .main{padding:1.8rem clamp(1rem,4vw,3rem);overflow-y:auto;max-height:calc(100vh - 60px)}
    .viewer{max-width:880px;margin:0 auto}
    .crumb{font-size:.74rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem}
    .viewer h2{font-family:'Lato',serif;font-weight:600;font-size:2rem;color:var(--deep);line-height:1.15;margin-bottom:.5rem}
    .viewer .ldesc{color:var(--mid);font-size:.95rem;line-height:1.6;margin-bottom:1.3rem}
    .embed{position:relative;width:100%;aspect-ratio:16/9;border-radius:16px;overflow:hidden;background:#1a0d1a;box-shadow:0 14px 44px rgba(59,26,58,.18);margin-bottom:1.2rem}
    .embed iframe,.embed video{position:absolute;inset:0;width:100%;height:100%;border:0}
    .pdfframe{width:100%;height:78vh;border:1px solid var(--line);border-radius:14px;margin-bottom:1.2rem;background:#fff}
    .richtext{font-size:1rem;line-height:1.75;color:var(--text)}
    .richtext p{margin:0 0 1rem}
    .richtext a{word-break:break-word}
    .richtext code{background:var(--blush);padding:.1rem .4rem;border-radius:6px;font-size:.9em}
    .filebar{display:flex;flex-wrap:wrap;gap:.6rem;align-items:center;margin-bottom:1.4rem}
    .lesson-actions{display:flex;gap:.7rem;flex-wrap:wrap;align-items:center;margin-top:1.6rem;padding-top:1.4rem;border-top:1px solid var(--line)}
    .empty{text-align:center;color:var(--muted);padding:4rem 1rem}
    .empty .em{font-size:2.4rem;margin-bottom:.6rem}

    .editbar{display:none;align-items:center;gap:.7rem;flex-wrap:wrap;padding:.7rem 1.4rem;background:#2e1a2e;color:#fff}
    body.admin-edit .editbar{display:flex}
    body.admin-edit .layout{display:none}
    .editbar .save-note{font-size:.78rem;color:var(--lavender);margin-left:auto}
    .editor{display:none;padding:1.6rem clamp(1rem,4vw,2.4rem);max-width:1000px;margin:0 auto}
    body.admin-edit .editor{display:block}
    .ed-field{margin-bottom:1rem}
    .ed-field label{display:block;font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:.35rem;font-weight:600}
    .ed-field input,.ed-field textarea,.ed-field select{width:100%;padding:.65rem .85rem;border:1.5px solid var(--lavender);border-radius:10px;font-family:inherit;font-size:.92rem;color:var(--text);background:var(--white);outline:none}
    .ed-field input:focus,.ed-field textarea:focus,.ed-field select:focus{border-color:var(--purple)}
    .ed-field textarea{min-height:120px;resize:vertical;line-height:1.5}
    .ed-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
    .ed-module{background:var(--white);border:1px solid var(--line);border-radius:16px;padding:1.1rem;margin-bottom:1.1rem}
    .ed-module-head{display:flex;align-items:center;gap:.6rem;margin-bottom:.8rem}
    .ed-module-head input{font-weight:600}
    .ed-lesson{background:var(--blush);border-radius:12px;padding:.9rem;margin-bottom:.7rem}
    .ed-lesson-top{display:flex;align-items:center;gap:.5rem;margin-bottom:.6rem}
    .ed-actions{display:flex;gap:.35rem;margin-left:auto}
    .icon-btn{border:1px solid var(--line);background:var(--white);color:var(--mid);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:.85rem;display:inline-flex;align-items:center;justify-content:center}
    .icon-btn:hover{background:var(--lavender);color:#fff;border-color:var(--lavender)}
    .icon-btn.del:hover{background:var(--err);border-color:var(--err)}
    .uploadrow{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;margin-top:.4rem}
    .hint{font-size:.74rem;color:var(--muted);margin-top:.3rem;line-height:1.45}
    .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--deep);color:#fff;padding:.7rem 1.3rem;border-radius:100px;font-size:.85rem;opacity:0;transition:.3s;z-index:700;box-shadow:0 10px 30px rgba(0,0,0,.25)}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .toast.err{background:var(--err)}

    @media(max-width:820px){
      .layout{grid-template-columns:1fr}
      .side{position:static;max-height:none;border-right:none;border-bottom:1px solid var(--line)}
      .main{max-height:none}
      .ed-row{grid-template-columns:1fr}
    }

    /* ---------- modern admin editor ---------- */
    .editor{padding:1.4rem clamp(1rem,4vw,2.4rem);max-width:920px;margin:0 auto}
    .ed-head{background:var(--white);border:1px solid var(--line);border-radius:16px;padding:1.1rem 1.2rem;margin-bottom:1.2rem;box-shadow:0 6px 24px rgba(160,80,159,.06)}
    .ed-head-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
    .ed-stats{display:flex;gap:1.4rem;margin-top:.9rem;font-size:.8rem;color:var(--muted)}
    .ed-stats strong{color:var(--purple);font-size:.95rem}
    .ed-mod{background:var(--white);border:1px solid var(--line);border-radius:16px;margin-bottom:.8rem;overflow:hidden;box-shadow:0 4px 18px rgba(160,80,159,.05)}
    .ed-mod-head{display:flex;align-items:center;gap:.55rem;padding:.65rem .8rem}
    .ed-mod-toggle{display:flex;align-items:center;gap:.55rem;border:none;background:none;cursor:pointer;padding:.2rem;flex:0 0 auto}
    .ed-chev{color:var(--muted);transition:transform .2s;font-size:.85rem}
    .ed-mod.open .ed-chev{transform:rotate(90deg)}
    .ed-mod-num{width:26px;height:26px;border-radius:8px;background:var(--blush);color:var(--purple);font-size:.78rem;font-weight:700;display:flex;align-items:center;justify-content:center}
    .ed-mod-title{flex:1;min-width:0;border:1px solid transparent;border-radius:8px;padding:.45rem .6rem;font-size:.95rem;font-weight:600;color:var(--deep);background:transparent;outline:none}
    .ed-mod-title:hover{background:var(--blush)}
    .ed-mod-title:focus{background:#fff;border-color:var(--lavender)}
    .ed-pill{font-size:.68rem;color:var(--mid);background:var(--blush);border-radius:100px;padding:.25rem .6rem;white-space:nowrap;flex:0 0 auto}
    .ed-mod-body{padding:.2rem .9rem 1rem;border-top:1px solid var(--line)}
    .ed-les{background:var(--blush);border:1px solid var(--line);border-radius:13px;padding:.9rem;margin-top:.8rem}
    .ed-les-top{display:flex;align-items:center;gap:.5rem;margin-bottom:.7rem}
    .ed-les-title{flex:1;min-width:0;border:1.5px solid var(--lavender);border-radius:9px;padding:.5rem .7rem;font-size:.92rem;font-weight:600;color:var(--deep);background:#fff;outline:none}
    .ed-les-title:focus{border-color:var(--purple)}
    .ed-seg{display:inline-flex;background:#fff;border:1.5px solid var(--lavender);border-radius:10px;padding:3px;gap:3px;margin-bottom:.85rem}
    .ed-seg-btn{border:none;background:none;border-radius:7px;padding:.42rem .9rem;font-size:.77rem;font-weight:600;color:var(--mid);cursor:pointer;transition:.15s}
    .ed-seg-btn:hover{color:var(--purple)}
    .ed-seg-btn.on{background:var(--purple);color:#fff}
    .dz-wrap{margin-bottom:.9rem}
    .dz{display:flex;align-items:center;gap:.85rem;border:2px dashed var(--lavender);border-radius:12px;padding:1rem;cursor:pointer;background:#fff;transition:.15s}
    .dz:hover{border-color:var(--purple);background:#fffdff}
    .dz.over{border-color:var(--purple);background:var(--blush)}
    .dz.busy{opacity:.65;pointer-events:none}
    .dz-ic{width:38px;height:38px;border-radius:50%;background:var(--blush);color:var(--purple);font-size:1.2rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
    .dz-txt{display:flex;flex-direction:column;line-height:1.35}
    .dz-txt strong{font-size:.88rem;color:var(--deep)}
    .dz-txt span{font-size:.73rem;color:var(--muted)}
    .dz-bar{height:4px;background:var(--blush);border-radius:100px;overflow:hidden;margin-top:.5rem;display:none}
    .dz-bar.on{display:block}
    .dz-bar span{display:block;height:100%;width:40%;background:linear-gradient(90deg,var(--purple),var(--lavender));border-radius:100px;animation:dzload 1.1s linear infinite}
    @keyframes dzload{0%{margin-left:-40%}100%{margin-left:100%}}
    .dz-stat{font-size:.76rem;color:var(--mid);margin-top:.4rem}
    .dz-stat.err{color:var(--err)}
    .dz-done{display:flex;align-items:center;gap:.6rem;background:#fff;border:1.5px solid rgba(63,157,107,.4);border-radius:11px;padding:.7rem .85rem}
    .dz-check{width:24px;height:24px;border-radius:50%;background:var(--ok);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.78rem;flex:0 0 auto}
    .dz-name{flex:1;min-width:0;font-size:.84rem;color:var(--deep);text-decoration:none;word-break:break-all}
    .dz-name:hover{text-decoration:underline}
    .dz-remove{border:1px solid var(--line);background:#fff;color:var(--err);border-radius:8px;padding:.35rem .7rem;font-size:.75rem;cursor:pointer;flex:0 0 auto}
    .dz-remove:hover{background:rgba(192,80,106,.08)}
    .ed-add-lesson{margin-top:.8rem;width:100%;border:1.5px dashed var(--lavender);background:#fff;color:var(--purple);border-radius:10px;padding:.6rem;font-size:.82rem;font-weight:600;cursor:pointer}
    .ed-add-lesson:hover{background:var(--blush)}
    .ed-add-module{margin-top:.6rem;width:100%;border:none;background:var(--purple);color:#fff;border-radius:12px;padding:.85rem;font-size:.9rem;font-weight:600;cursor:pointer}
    .ed-add-module:hover{background:var(--mid)}
    @media(max-width:640px){.ed-head-row{grid-template-columns:1fr}.ed-seg{width:100%}.ed-seg-btn{flex:1}}
  </style>
</head>
<body>

<div id="boot"><div class="spinner"></div><p style="color:var(--muted)">Loading…</p></div>

<!-- ===================== AUTH ===================== -->
<div id="auth">
  <div class="auth-card">
    <div class="auth-logo">
      <img src="gcourses-logo.png" alt="Gcourses" />
      <div class="sub">Student Portal</div>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-in" type="button">Log In</button>
      <button class="auth-tab" id="tab-up" type="button">Create Account</button>
    </div>
    <div class="auth-body">
      <h2 id="auth-title">Welcome back</h2>
      <p class="lead" id="auth-lead">Log in with your email and password to open the portal.</p>
      <form id="auth-form">
        <div class="field">
          <label>Email</label>
          <input type="email" id="au-email" placeholder="you@example.com" autocomplete="email" required />
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="au-pass" placeholder="••••••••" autocomplete="current-password" minlength="6" required />
        </div>
        <button class="auth-btn" id="au-submit" type="submit">Log in</button>
        <div class="auth-msg" id="au-msg"></div>
      </form>
      <div class="auth-foot" id="au-switch"></div>
    </div>
  </div>
</div>

<!-- ===================== APP ===================== -->
<div id="app">
  <div class="topbar">
    <div class="brand"><img src="gcourses-logo.png" alt="Gcourses" /><span class="sub">Portal</span></div>
    <div class="tools">
      <span class="who" id="who"></span>
      <button class="btn ghost sm" id="admin-toggle" style="display:none">Admin</button>
      <button class="btn ghost sm" id="logout">Log out</button>
    </div>
  </div>

  <div class="editbar">
    <button class="btn sm" id="add-module">+ Add module</button>
    <button class="btn ghost sm" id="exit-edit" style="color:#fff;border-color:rgba(255,255,255,.3)">Done editing</button>
    <span class="save-note" id="save-note">All changes saved</span>
    <button class="btn sm" id="save-btn">Save changes</button>
  </div>

  <div class="layout">
    <aside class="side">
      <h1 id="course-title">Portal</h1>
      <p class="intro" id="course-intro"></p>
      <div class="progress-wrap">
        <div class="progress-bar"><span id="progress-fill"></span></div>
        <div class="progress-label" id="progress-label">0% complete</div>
      </div>
      <div id="module-list"></div>
    </aside>
    <main class="main"><div class="viewer" id="viewer"></div></main>
  </div>

  <div class="editor" id="editor"></div>
</div>

<div class="toast" id="toast"></div>

<script src="/gc-experience.js" defer></script>
<script>window.GC_SEED = {
  "title": "ACT / EST Biology — Full Course",
  "intro": "Work through each module: read the revision notes, then do the real-test practice (PDF) and watch the walkthrough video.",
  "modules": [
    {
      "id": "ch1-m1",
      "title": "Chapter 1 · Module 1: Evolution",
      "lessons": [
        {
          "id": "ch1-m1-notes",
          "type": "text",
          "title": "Lesson & Revision Notes",
          "description": "Read through the key concepts before the real-test practice.",
          "url": "",
          "text": "**EVOLUTION & ADAPTATION**\n\nEvolution is the change in the **allele (gene) frequencies** of a population over time. *Individuals never evolve — only populations do.*\n• **Microevolution** = small changes within a species.\n• **Macroevolution** = changes that produce new species (speciation).\n\n**Evidence for evolution (6 areas):**\n• Fossil record (incl. transitional fossils like *Archaeopteryx*)\n• Comparative anatomy — *homologous* (same structure, different function → divergent / common ancestry), *analogous* (same function, different structure → convergent), *vestigial* (appendix, coccyx).\n• Comparative biochemistry (common ancestor = common pathways)\n• Comparative embryology (gill pouches in all vertebrate embryos)\n• Molecular biology (cytochrome c, DNA similarity)\n• Biogeography (Pangaea, continental drift)\n\n**Darwin — Natural Selection:** overproduction → variation → struggle for existence → survival of the fittest. *Fittest* = most surviving, fertile offspring. Examples: giraffe neck, antibiotic resistance, peppered moth.\n**Lamarck** (use & disuse, inheritance of acquired traits) was disproved by **Weismann** (mouse-tail experiment).\n\n**Types of selection:** *stabilizing* (favours intermediate), *directional* (favours one extreme), *disruptive* (favours both extremes).\n\n**Sources of variation:** mutation, genetic drift (**bottleneck** & **founder** effects), gene flow.\n\n**Speciation / reproductive isolation:** geographic, polyploidy, temporal, habitat, behavioural.\n**Patterns:** coevolution, parallel evolution, adaptive radiation (Darwin's finches), phylogenetic trees.\n\n**Origin of life:** Heterotroph hypothesis, Endosymbiosis (mitochondria/chloroplasts), Oparin–Haldane, Miller–Urey, Redi & Pasteur (disproved spontaneous generation), gradualism vs punctuated equilibrium.\n\n**Hardy–Weinberg** (p² + 2pq + q² = 1, p + q = 1): no evolution when population is very large, isolated, no mutation, random mating, no genetic drift, no natural selection."
        },
        {

      "id": "ch1-m2",
      "title": "Chapter 1 · Module 2: Animal Behavior",
      "lessons": [
        {
          "id": "ch1-m2-notes",
          "type": "text",
          "title": "Lesson & Revision Notes",
          "description": "Read through the key concepts before the real-test practice.",
          "url": "",
          "text": "**ANIMAL BEHAVIOR**\n\nBehaviour = a change in activity in response to an internal or external stimulus.\n\n**Innate (genetic, inherited):**\n• **Fixed Action Pattern (FAP)** — instinctive, stereotyped sequence that runs to completion once triggered by a **sign stimulus** (e.g., goose egg-rolling — *Niko Tinbergen*; stickleback red belly).\n• **Von Frisch** — honeybee *waggle dance*.\n\n**Learned behaviour:**\n• **Habituation** — stops responding to a repeated harmless stimulus.\n• **Imprinting** — learning in a critical period, irreversible (*Konrad Lorenz*, geese).\n• **Classical conditioning** — pairing a new stimulus with a familiar one (*Ivan Pavlov*, dogs + bell).\n• **Operant conditioning** — trial-and-error, reward/punishment (*B.F. Skinner*, rats + lever).\n• **Insight / reasoning** — using past experience to solve a problem.\n\n**Social behaviour:** cooperation, agonistic (aggression), dominance hierarchy, pheromones, **altruism / kin selection** (help relatives → shared genes; alarm calls, vampire bats).\n\n**Communication:** visual, auditory, chemical (pheromones), tactile. **Camouflage** (blend with environment) vs **mimicry** (resemble a dangerous species).\n\n**Taxis** = directional movement toward/away from a stimulus: phototaxis (light), chemotaxis (chemicals), geotaxis (gravity).\n\n**Thermoregulation:** *Endotherms* (birds, mammals) make heat internally, constant temp. *Ectotherms* (fish, amphibians, reptiles) rely on external heat."

      "id": "ch1-m3",
      "title": "Chapter 1 · Module 3: Ecology",
      "lessons": [
        {
          "id": "ch1-m3-notes",
          "type": "text",
          "title": "Lesson & Revision Notes",
          "description": "Read through the key concepts before the real-test practice.",
          "url": "",
          "text": "**ECOLOGY**\n\n**Levels:** organism → population → community → ecosystem → biome → biosphere.\n• **Abiotic** = non-living (temp, water, light); **Biotic** = living. **Niche** = full ecological role.\n\n**Populations:** size, density, dispersion (clumped = most common, uniform, random). Limited by births, deaths, immigration, emigration.\n**Growth:** *exponential* (J-curve, no limits) vs *logistic* (S-curve, **carrying capacity K**).\n**Limiting factors:** density-dependent (competition, disease, predation) vs density-independent (disasters, weather).\n\n**Survivorship:** Type I (K-selected, survive to old age), Type II (constant), Type III (r-selected, most die young).\n\n**Species interactions:** predation, competition (intraspecific/interspecific), **competitive exclusion** (Gause's *Paramecium*).\n**Symbiosis (long-term):** mutualism (+/+), commensalism (+/0), parasitism (+/−).\n\n**Nutrition:** producers/autotrophs (photoautotrophs, chemoautotrophs at vents); consumers/heterotrophs; decomposers (detritivores digest internally; saprotrophs digest externally).\n\n**Energy:** food chain (≤4–5 levels) → food web. **10% rule** — only 10% of energy passes up each trophic level. **Biological magnification** — toxins (DDT) concentrate up the chain.\n\n**Succession:** primary (bare rock, pioneers = lichens) vs secondary (soil exists, faster) → climax community.\n\n**Biogeochemical cycles:** water, carbon, nitrogen (fixation → nitrification → denitrification), phosphorus (no gas phase).\n\n**Biomes (equator→pole):** rainforest → desert → grassland → temperate forest → taiga → tundra. Marine = largest; rainforest = most diverse; tundra = permafrost.\n\n**Human impact:** eutrophication, acid rain, global warming (greenhouse gases), ozone depletion (CFCs), biomagnification, biological control."

      "id": "ch2-m1",
      "title": "Chapter 2 · Module 1: Cell Structure",
      "lessons": [
        {
          "id": "ch2-m1-notes",
          "type": "text",
          "title": "Lesson & Revision Notes",
          "description": "Read through the key concepts before the real-test practice.",
          "url": "",
          "text": "**CELL STRUCTURE**\n\n**Cell theory:** all living things are made of cells; cells are the basic unit of life; all cells come from pre-existing cells.\n\n**Prokaryotic** (bacteria, archaea): no nucleus, no membrane-bound organelles, circular DNA + plasmids, small (0.2–2 µm).\n**Eukaryotic** (plant, animal, fungi, protist): true nucleus, membrane-bound organelles, larger.\n*Only 4 structures in ALL cells:* ribosome, chromosome (DNA), cytoplasm, cell membrane.\n*Double-membrane organelles:* nucleus, mitochondria, chloroplast.\n\n**Organelles:**\n• **Ribosome** — protein synthesis (free or bound to RER).\n• **Nucleus** — controls cell; holds DNA + nucleolus (makes ribosomes/rRNA).\n• **RER** — protein synthesis/transport; **SER** — lipids, steroids, detox.\n• **Golgi** — modifies, packages, ships proteins; makes lysosomes.\n• **Lysosome** (animal) — digestion, apoptosis (Tay-Sachs = missing enzyme).\n• **Vacuole** — storage; large central vacuole in plants; contractile vacuole in protozoa.\n• **Mitochondria** — cellular respiration (own DNA + ribosomes).\n• **Chloroplast** (plant/algae) — photosynthesis (own DNA + ribosomes).\n• **Cytoskeleton** — microfilaments (actin: cleavage furrow, pseudopods), microtubules (cilia, flagella, spindle, centrioles).\n• **Cell membrane** — fluid mosaic: phospholipid bilayer + proteins + cholesterol + carbs.\n• **Cell wall** — support: bacteria = peptidoglycan, fungi = chitin, plants/algae = cellulose; **plasmodesmata** connect plant cells.\n\n**Studying cells:** ultracentrifuge (separates organelles by mass), light/phase-contrast microscope (living cells), electron microscope (TEM = internal, SEM = surface; not living). Total magnification = ocular × objective."

      "id": "ch2-m2",
      "title": "Chapter 2 · Module 2: Cell Transport",
      "lessons": [
        {
          "id": "ch2-m2-notes",
          "type": "text",
          "title": "Lesson & Revision Notes",
          "description": "Read through the key concepts before the real-test practice.",
          "url": "",
          "text": "**CELL TRANSPORT**\n\nThe membrane is **selectively permeable** — small/non-polar molecules pass; large/polar (starch, protein, sucrose) are blocked.\n\n**Tonicity:** solute concentration outside vs inside.\n• **Hypertonic** (more solute outside) → water leaves → animal cell shrinks, plant cell **plasmolysis**.\n• **Hypotonic** (less solute outside) → water enters → animal cell swells/**lyses**, plant cell **turgid**.\n• **Isotonic** → no net movement (0.9% saline for RBCs).\n\n**Passive transport (NO energy, high → low):**\n• **Simple diffusion** (O₂, CO₂ across membrane).\n• **Facilitated diffusion** (via channel/carrier proteins, e.g. glucose, ions). Aquaporins = water channels.\n• **Osmosis** — diffusion of water toward higher solute.\n\n**Active transport (needs ATP, low → high):** e.g. sodium-potassium pump (Na⁺/K⁺), ion pumps.\n\n**Vesicular transport:**\n• **Endocytosis** (into cell): phagocytosis (solids), pinocytosis (liquids), receptor-mediated.\n• **Exocytosis** (out of cell): vesicle fuses with membrane (e.g. neurotransmitters).\n\nRate of diffusion ↑ with bigger gradient, higher temp, more surface area, thinner membrane."

      "id": "ch2-m3",
      "title": "Chapter 2 · Module 3: Cell Division",
      "lessons": [
        {
          "id": "ch2-m3-notes",
          "type": "text",
          "title": "Lesson & Revision Notes",
          "description": "Read through the key concepts before the real-test practice.",
          "url": "",
          "text": "**CELL DIVISION**\n\n**Chromosomes** = DNA + histone proteins. Humans = 46 (23 pairs): 22 autosome pairs + 1 sex pair (XX female, XY male). **Karyotype** = ordered image of chromosomes (made at metaphase).\n**Homologous chromosomes** = same length, centromere, genes (one from each parent).\n**Diploid (2n)** = two sets; **Haploid (n)** = one set.\n\n**Cell cycle:** Interphase (G₁ → S [DNA replication] → G₂) → M phase (mitosis + cytokinesis).\n*Cancer* = mutations in cell-cycle control proteins → uncontrolled division.\n\n**MITOSIS** (somatic cells → 2 identical diploid cells):\n• **Prophase** — chromosomes condense, nuclear membrane & nucleolus disappear, spindle forms.\n• **Metaphase** — chromosomes line up in the middle.\n• **Anaphase** — sister chromatids separate to poles.\n• **Telophase** — two nuclei reform; then **cytokinesis** (animal = cleavage furrow, plant = cell plate).\n\n**MEIOSIS** (gametes → 4 genetically different haploid cells, 2 divisions):\n• **Crossing over** in *Prophase I* → genetic variation.\n• Meiosis I separates homologues; Meiosis II separates sister chromatids (Anaphase II).\n\nCells after n divisions = 2ⁿ. DNA: doubles in S, halves after mitosis, quartered after meiosis."

    {
      "id": "ch2-m4",
      "title": "Chapter 2 · Module 4: DNA Replication & Protein Synthesis",
      "lessons": [
        {
          "id": "ch2-m4-notes",
          "type": "text",
          "title": "Lesson & Revision Notes",
          "description": "Read through the key concepts before the real-test practice.",
          "url": "",
          "text": "**DNA REPLICATION & PROTEIN SYNTHESIS**\n\n**DNA structure:** double helix, two strands (anti-parallel 5'→3'). Nucleotide = sugar (deoxyribose) + phosphate + base.\n**Base pairing:** A–T (2 H-bonds), G–C (3 H-bonds). Covalent bonds within a strand, hydrogen bonds between bases. **Chargaff:** A=T, G=C.\n\n**Replication** (S phase, *semi-conservative* — each new molecule = 1 old + 1 new strand):\n• **Helicase** unzips (breaks H-bonds).\n• **DNA polymerase** adds nucleotides by base-pairing.\n• **DNA ligase** joins fragments.\n• **Telomeres** = protective non-coding ends.\n\n**RNA:** single strand, ribose sugar, bases A-U-C-G (uracil replaces thymine). Types: **mRNA** (carries code), **tRNA** (carries amino acids, has anticodon), **rRNA** (ribosome structure).\n\n**Protein synthesis (gene expression):**\n• **Transcription** (nucleus) — RNA polymerase builds mRNA from DNA.\n• **RNA processing/splicing** (nucleus) — remove introns, keep exons.\n• **Translation** (ribosome) — mRNA read in **codons** (3 bases). Start = **AUG** (met); stop = **UAA, UAG, UGA**. tRNA anticodons pair with codons to build the polypeptide.\n\n**Genetic code:** 64 codons, 20 amino acids → *degenerate* (protects against mutations). ~97% of human genome is non-coding.\n\n**Key experiments:** Watson & Crick (double helix, from Rosalind Franklin's data); Hershey & Chase (DNA is the genetic material); Griffith (transformation).\nProkaryotes: transcription & translation happen together in cytoplasm."

    {
      "id": "ch3-m1",
      "title": "Chapter 3 · Module 1: Biochemistry & Enzymes",
      "lessons": [
        {
          "id": "ch3-m1-notes",
          "type": "text",
          "title": "Lesson & Revision Notes",
          "description": "Read through the key concepts before the real-test practice.",
          "url": "",
          "text": "**BIOCHEMISTRY & ENZYMES**\n\n**Organic molecules** contain carbon + hydrogen (carbohydrates, lipids, proteins, nucleic acids, vitamins). Carbon forms 4 covalent bonds → huge diversity.\n\n**Carbohydrates** (CH₂O)ₙ — quick energy, 4 cal/g.\n• Monosaccharides (glucose, fructose, galactose — isomers), disaccharides (sucrose, lactose, maltose — glycosidic bond), polysaccharides (starch = plant store, glycogen = animal store, cellulose = plant wall, chitin).\n• Built by **dehydration**, broken by **hydrolysis**.\n\n**Lipids** — C, H, O (little O); 9 cal/g. Triglyceride = glycerol + 3 fatty acids. Saturated (no double bonds, solid, animal) vs unsaturated (double bonds, liquid, plant). Functions: energy store, membranes (phospholipids), insulation, hormones (steroids), cushioning.\n\n**Proteins** — C, H, O, N; 4 cal/g; amino acids + peptide bonds. Structure: primary (sequence) → secondary (helix, H-bonds) → tertiary (3D, *determines function*) → quaternary (multiple chains, e.g. haemoglobin). **Denaturation** by heat/pH. Functions: enzymes, hormones, antibodies, transport, structure.\n\n**Nucleic acids** — DNA, RNA, ATP (adenine + ribose + 3 phosphates; energy released between 2nd & 3rd phosphate).\n**Vitamins** — coenzymes; water-soluble (B, C) vs fat-soluble (A, D, E, K).\n\n**Water:** polar; high specific heat, cohesion/adhesion (capillary action, surface tension), ice less dense than water, high heat of vaporization, universal solvent.\n**pH:** 0–14 (7 neutral). Each unit = 10× change. Buffers resist pH change.\n\n**Enzymes** = protein catalysts that **lower activation energy**; specific (**induced-fit model**), reusable, need cofactors (minerals)/coenzymes (vitamins). Affected by temperature, pH (pepsin pH 2, trypsin pH 8.5), substrate/enzyme concentration. Inhibitors: competitive (active site) vs non-competitive (allosteric)."

      "id": "ch3-m2",
      "title": "Chapter 3 · Module 2: Photosynthesis & Cellular Respiration",
      "lessons": [
        {
          "id": "ch3-m2-notes",
          "type": "text",
          "title": "Lesson & Revision Notes",
          "description": "Read through the key concepts before the real-test practice.",
          "url": "",
          "text": "**PHOTOSYNTHESIS & CELLULAR RESPIRATION**\n\n**Cellular respiration** releases energy from glucose into ATP. Aerobic (with O₂) vs anaerobic (without).\n\n**AEROBIC RESPIRATION** (≈36–38 ATP total):\n• **Glycolysis** (cytoplasm, anaerobic start) — glucose → 2 pyruvate + 2 ATP + 2 NADH.\n• **Krebs / Citric acid cycle** (mitochondrial matrix, runs twice) — pyruvate → Acetyl-CoA; releases CO₂; makes ATP, NADH, FADH₂.\n• **Oxidative phosphorylation / ETC** (inner membrane, cristae) — NADH & FADH₂ drop electrons down the chain; proton gradient drives **ATP synthase** (chemiosmosis) → ~32 ATP. **O₂ is the final electron/hydrogen acceptor.**\n(NADH → 3 ATP, FADH₂ → 2 ATP.)\n\n**ANAEROBIC RESPIRATION / FERMENTATION** (cytoplasm, no O₂, only 2 ATP — regenerates NAD⁺ for glycolysis):\n• **Lactic acid fermentation** — muscles, yogurt bacteria → lactic acid + 2 ATP.\n• **Alcohol fermentation** — yeast → ethanol + CO₂ + 2 ATP.\n\n**Photosynthesis** (reverse idea): 6CO₂ + 6H₂O + light → C₆H₁₂O₆ + 6O₂, in chloroplasts (light reactions in thylakoids, Calvin cycle in stroma)."

          "description": "Read through the key concepts before the real-test practice.",
          "url": "",
          "text": "**CLASSICAL GENETICS**\n\n**Mendel's laws:** segregation (alleles separate into gametes) and independent assortment.\n• **Genotype** (alleles) vs **phenotype** (trait); homozygous vs heterozygous; dominant vs recessive.\n• **Punnett squares:** monohybrid 3:1, dihybrid 9:3:3:1; test cross to find unknown genotype.\n\n**Extensions:** incomplete dominance (blend), codominance (both shown, e.g. AB blood), multiple alleles (ABO), polygenic traits, pleiotropy, epistasis.\n**Sex linkage:** X-linked recessive (colour-blindness, haemophilia) more common in males.\n**Linkage & recombination:** genes close on a chromosome are inherited together; crossing over separates them."

          "text": "**PLANT STRUCTURE, GROWTH & REPRODUCTION**\n\n**Tissues:** dermal (epidermis, cuticle), vascular (**xylem** = water up, **phloem** = sugars), ground.\n**Organs:** roots (absorb water/minerals), stems (support, transport), leaves (photosynthesis; stomata + guard cells control gas exchange & transpiration).\n**Transport:** transpiration pull (cohesion-tension) in xylem; translocation in phloem.\n**Growth:** meristems; tropisms (phototropism, gravitropism, thigmotropism); hormones (auxin, gibberellin, cytokinin, ethylene, ABA).\n**Reproduction:** alternation of generations; flower parts (stamen = anther + filament; carpel = stigma, style, ovary); pollination → double fertilization → seed & fruit."

          "text": "**TAXONOMY & CLASSIFICATION SYSTEMS**\n\n**Hierarchy:** Domain → Kingdom → Phylum → Class → Order → Family → Genus → Species (*\"Dear King Philip Came Over For Good Soup\"*).\n**Binomial nomenclature:** *Genus species* (Linnaeus).\n**3 Domains:** Bacteria, Archaea, Eukarya. **Kingdoms:** Protista, Fungi, Plantae, Animalia (+ bacteria).\n**Phylogenetics:** cladograms/phylogenetic trees show common ancestry; shared derived traits; more recent common ancestor = more related.\n**Viruses:** non-living, need a host (lytic vs lysogenic cycles)."

    var n=(m.lessons||[]).length;
    var pill=el('span','ed-pill',n+' lesson'+(n===1?'':'s'));
    var acts=el('div','ed-actions');
    acts.appendChild(iconBtn('↑','Move up',function(){move(state.curriculum.modules,mi,-1);renderEditor();}));
    acts.appendChild(iconBtn('↓','Move down',function(){move(state.curriculum.modules,mi,1);renderEditor();}));
    acts.appendChild(iconBtn('✕','Delete module',function(){if(confirm('Delete this module and all its lessons?')){state.curriculum.modules.splice(mi,1);markDirty();renderEditor();}},'del'));
    head.appendChild(toggle); head.appendChild(ti); head.appendChild(pill); head.appendChild(acts);
    card.appendChild(head);
    if(m._open){
      var body=el('div','ed-mod-body');
      (m.lessons||[]).forEach(function(l,li){ body.appendChild(lessonCard(m,l,li)); });
      var add=el('button','ed-add-lesson','+ Add lesson'); add.type='button';
      add.addEventListener('click',function(){ m.lessons=m.lessons||[]; m.lessons.push({id:id(),type:'video',title:'New lesson',url:'',text:'',description:''}); markDirty(); renderEditor(); });
      body.appendChild(add);
      card.appendChild(body);
    }
    return card;
  }

  var LTYPES=[['video','Video'],['pdf','PDF'],['text','Notes'],['link','Link']];
  function lessonCard(m,l,li){
    var box=el('div','ed-les');
    var top=el('div','ed-les-top');
    var ti=el('input','ed-les-title'); ti.value=l.title||''; ti.placeholder='Lesson title';
    ti.addEventListener('input',function(){l.title=ti.value;markDirty();});
    var acts=el('div','ed-actions');
    acts.appendChild(iconBtn('↑','Move up',function(){move(m.lessons,li,-1);renderEditor();}));
    acts.appendChild(iconBtn('↓','Move down',function(){move(m.lessons,li,1);renderEditor();}));
    acts.appendChild(iconBtn('✕','Delete lesson',function(){if(confirm('Delete this lesson?')){m.lessons.splice(li,1);markDirty();renderEditor();}},'del'));
    top.appendChild(ti); top.appendChild(acts); box.appendChild(top);

    var seg=el('div','ed-seg');
    LTYPES.forEach(function(t){
      var b=el('button','ed-seg-btn'+(l.type===t[0]?' on':''),t[1]); b.type='button';
      b.addEventListener('click',function(){ if(l.type!==t[0]){ l.type=t[0]; markDirty(); renderEditor(); } });
      seg.appendChild(b);
    });
    box.appendChild(seg);
    box.appendChild(field('Short description (optional)',inputFor(l,'description','One line shown under the title')));

    if(l.type==='video'){
      box.appendChild(dropzone(l,'video/*','Video','Drop a recording here, or click to browse'));
      box.appendChild(field('…or paste a link (YouTube, Vimeo, Loom, Drive, .mp4)',inputFor(l,'url','https://youtu.be/…')));
      box.appendChild(field('Notes shown below (optional)',textareaFor(l,'text')));
    } else if(l.type==='pdf'){
      box.appendChild(dropzone(l,'application/pdf,.pdf','PDF','Drop a PDF here, or click to browse'));
      box.appendChild(field('…or paste a link (Drive, Dropbox, direct .pdf)',inputFor(l,'url','https://…')));
      box.appendChild(field('Notes shown below (optional)',textareaFor(l,'text')));
    } else if(l.type==='link'){
      box.appendChild(field('Resource URL',inputFor(l,'url','https://…')));
    } else {
      box.appendChild(field('Notes (supports **bold**, *italics*, `code`, and links)',textareaFor(l,'text')));
    }
    return box;
  }

  function dropzone(l,accept,kind,prompt){
    var wrap=el('div','dz-wrap');
    if(l.url && !/^https?:\/\/(www\.)?(youtu|vimeo|loom|drive\.google)/i.test(l.url)){
      // a file/link is attached — show a tidy "attached" state
      var done=el('div','dz-done');
      var nm=decodeURIComponent(l.url.split('/').pop().split('?')[0])||'Attached file';
      done.innerHTML='<span class="dz-check">✓</span><a class="dz-name" href="'+esc(l.url)+'" target="_blank" rel="noopener">'+esc(nm)+'</a>';
      var rm=el('button','dz-remove','Remove'); rm.type='button';
      rm.addEventListener('click',function(){ l.url=''; markDirty(); renderEditor(); });
      done.appendChild(rm); wrap.appendChild(done); return wrap;
    }
    var dz=el('div','dz');
    dz.innerHTML='<div class="dz-ic">↑</div><div class="dz-txt"><strong>'+esc(prompt)+'</strong><span>'+esc(kind)+' &middot; saved to your Supabase storage</span></div>';
    var inp=el('input'); inp.type='file'; inp.accept=accept; inp.style.display='none';
    var bar=el('div','dz-bar'); bar.appendChild(el('span'));
    var stat=el('div','dz-stat');
    function upload(file){
      if(!file) return;
      dz.classList.add('busy'); bar.classList.add('on'); stat.className='dz-stat'; stat.textContent='Uploading “'+file.name+'”…';
      var path=Date.now()+'-'+file.name.replace(/[^a-zA-Z0-9._-]+/g,'-');
      sb.storage.from('portal-files').upload(path,file,{upsert:false,contentType:file.type||undefined}).then(function(res){
        dz.classList.remove('busy'); bar.classList.remove('on');
        if(res.error){ stat.className='dz-stat err'; stat.textContent=/bucket|not.*found/i.test(res.error.message||'')?'Create a public “portal-files” bucket in Supabase → Storage first (or paste a link below).':(res.error.message||'Upload failed.'); return; }
        l.url=sb.storage.from('portal-files').getPublicUrl(path).data.publicUrl; markDirty(); renderEditor();
      }).catch(function(){ dz.classList.remove('busy'); bar.classList.remove('on'); stat.className='dz-stat err'; stat.textContent='Upload failed — try a link below.'; });
    }
    dz.addEventListener('click',function(){inp.click();});
    inp.addEventListener('change',function(){ upload(inp.files[0]); });
    ['dragenter','dragover'].forEach(function(ev){ dz.addEventListener(ev,function(e){e.preventDefault();dz.classList.add('over');}); });
    ['dragleave','drop'].forEach(function(ev){ dz.addEventListener(ev,function(e){e.preventDefault();dz.classList.remove('over');}); });
    dz.addEventListener('drop',function(e){ if(e.dataTransfer&&e.dataTransfer.files&&e.dataTransfer.files[0]) upload(e.dataTransfer.files[0]); });
    wrap.appendChild(dz); wrap.appendChild(inp); wrap.appendChild(bar); wrap.appendChild(stat);
    return wrap;
  }
  function field(label,control){var f=el('div','ed-field');f.appendChild(el('label',null,esc(label)));f.appendChild(control);return f;}
  function inputFor(o,k,ph){var i=el('input');i.value=o[k]||'';if(ph)i.placeholder=ph;i.addEventListener('input',function(){o[k]=i.value;markDirty();});return i;}
  function textareaFor(o,k){var t=el('textarea');t.value=o[k]||'';t.addEventListener('input',function(){o[k]=t.value;markDirty();});return t;}
  function iconBtn(label,title,fn,extra){var b=el('button','icon-btn'+(extra?' '+extra:''),label);b.type='button';b.title=title;b.addEventListener('click',fn);return b;}
  function move(arr,i,dir){var j=i+dir;if(j<0||j>=arr.length)return;var t=arr[i];arr[i]=arr[j];arr[j]=t;markDirty();}

  window.addEventListener('beforeunload',function(e){ if(state.dirty){e.preventDefault();e.returnValue='';} });

  // Surface any boot/runtime error on screen so it can't fail silently.
  function showBootError(err){
    var g=document.getElementById('boot'); if(!g) return;
    g.style.display='flex';
    g.innerHTML='<div style="max-width:440px;text-align:center;padding:1.4rem;color:#7d2c40;font-size:.9rem;line-height:1.5">'+
      '<strong>The portal hit an error while loading.</strong><br><br>'+
      '<span style="font-family:monospace;font-size:.8rem;word-break:break-word">'+esc(String((err&&err.message)||err||'unknown'))+'</span>'+
      '<br><br>Please screenshot this and send it.</div>';
  }
  window.addEventListener('error',function(e){ showBootError(e.error||e.message); });
  window.addEventListener('unhandledrejection',function(e){ showBootError(e.reason); });

  try { boot(); } catch(err){ showBootError(err); }
})();
</script>
