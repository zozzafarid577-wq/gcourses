<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal — Gcourses</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/gcourses-logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;1,400&family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/gc-experience.css" />
  <style>
    :root{
      --purple:#a0509f; --lavender:#dab5d5; --blush:#f3e7f3;
      --deep:#3b1a3a; --mid:#6b3569; --text:#2e1a2e;
      --muted:#8a6a88; --white:#fdfafd; --line:rgba(218,181,213,.4);
      --ok:#3f9d6b; --err:#c0506a;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:'Montserrat',system-ui,sans-serif;background:var(--blush);color:var(--text);min-height:100vh}
    a{color:var(--purple)}
    button{font-family:inherit}

    /* ---------- gate / loading ---------- */
    #gate{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;background:var(--blush);z-index:500;text-align:center;padding:2rem}
    #gate p{color:var(--muted)}
    .spinner{width:34px;height:34px;border:3px solid var(--lavender);border-top-color:var(--purple);border-radius:50%;animation:spin 0.8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .btn{display:inline-block;background:var(--purple);color:#fff;border:none;border-radius:100px;padding:.7rem 1.5rem;font-size:.9rem;font-weight:500;cursor:pointer;text-decoration:none;transition:.2s}
    .btn:hover{background:var(--mid);transform:translateY(-1px)}
    .btn.ghost{background:transparent;color:var(--purple);border:1.5px solid var(--lavender)}
    .btn.ghost:hover{background:var(--blush);color:var(--mid)}
    .btn.sm{padding:.4rem .85rem;font-size:.8rem}
    .btn.danger{background:transparent;color:var(--err);border:1.5px solid rgba(192,80,106,.4)}
    .btn.danger:hover{background:rgba(192,80,106,.08)}

    /* ---------- shell ---------- */
    #app{display:none;min-height:100vh}
    .topbar{position:sticky;top:0;z-index:120;display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:.7rem 1.4rem;background:rgba(253,250,253,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
    .topbar .brand{display:flex;align-items:center;gap:.7rem}
    .topbar .brand .sub{font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
    .topbar .tools{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap}
    .who{font-size:.8rem;color:var(--muted)}
    .badge{font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;background:var(--purple);color:#fff;padding:.2rem .5rem;border-radius:100px;font-weight:600}

    .layout{display:grid;grid-template-columns:320px 1fr;gap:0;min-height:calc(100vh - 60px)}
    .side{border-right:1px solid var(--line);background:var(--white);padding:1.2rem;overflow-y:auto;max-height:calc(100vh - 60px);position:sticky;top:60px}
    .side h1{font-family:'Lato',serif;font-size:1.5rem;font-weight:600;color:var(--deep);line-height:1.2;margin-bottom:.3rem}
    .side .intro{font-size:.82rem;color:var(--muted);line-height:1.5;margin-bottom:1rem}

    .progress-wrap{margin:0 0 1.2rem}
    .progress-bar{height:8px;background:var(--blush);border-radius:100px;overflow:hidden}
    .progress-bar span{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--purple),var(--lavender));border-radius:100px;transition:width .4s ease}
    .progress-label{font-size:.74rem;color:var(--muted);margin-top:.4rem}

    .module{margin-bottom:.5rem;border:1px solid var(--line);border-radius:14px;overflow:hidden;background:var(--white)}
    .module-head{display:flex;align-items:center;gap:.5rem;padding:.7rem .85rem;cursor:pointer;user-select:none}
    .module-head:hover{background:var(--blush)}
    .module-head .mtitle{flex:1;font-weight:600;font-size:.92rem;color:var(--deep)}
    .module-head .chev{color:var(--muted);transition:transform .2s}
    .module.collapsed .chev{transform:rotate(-90deg)}
    .module.collapsed .lessons{display:none}
    .mcount{font-size:.7rem;color:var(--muted)}
    .lessons{padding:.2rem .4rem .5rem;display:flex;flex-direction:column;gap:2px}
    .lesson{display:flex;align-items:center;gap:.55rem;padding:.5rem .6rem;border-radius:9px;cursor:pointer;font-size:.86rem;color:var(--text)}
    .lesson:hover{background:var(--blush)}
    .lesson.active{background:var(--blush);box-shadow:inset 3px 0 0 var(--purple)}
    .lesson .tick{width:18px;height:18px;border-radius:50%;border:2px solid var(--lavender);flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:.66rem;color:#fff;background:transparent;transition:.15s}
    .lesson.done .tick{background:var(--ok);border-color:var(--ok)}
    .lesson .ltype{font-size:.62rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);flex:0 0 auto}
    .lesson .ltitle{flex:1;line-height:1.25}

    /* ---------- main viewer ---------- */
    .main{padding:1.8rem clamp(1rem,4vw,3rem);overflow-y:auto;max-height:calc(100vh - 60px)}
    .viewer{max-width:880px;margin:0 auto}
    .crumb{font-size:.74rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem}
    .viewer h2{font-family:'Lato',serif;font-weight:600;font-size:2rem;color:var(--deep);line-height:1.15;margin-bottom:.5rem}
    .viewer .ldesc{color:var(--mid);font-size:.95rem;line-height:1.6;margin-bottom:1.3rem}
    .embed{position:relative;width:100%;aspect-ratio:16/9;border-radius:16px;overflow:hidden;background:#1a0d1a;box-shadow:0 14px 44px rgba(59,26,58,.18);margin-bottom:1.2rem}
    .embed iframe,.embed video{position:absolute;inset:0;width:100%;height:100%;border:0}
    .pdfframe{width:100%;height:78vh;border:1px solid var(--line);border-radius:14px;margin-bottom:1.2rem;background:#fff}
    .richtext{font-size:1rem;line-height:1.75;color:var(--text)}
    .richtext p{margin:0 0 1rem}
    .richtext a{word-break:break-word}
    .richtext code{background:var(--blush);padding:.1rem .4rem;border-radius:6px;font-size:.9em}
    .filebar{display:flex;flex-wrap:wrap;gap:.6rem;align-items:center;margin-bottom:1.4rem}
    .lesson-actions{display:flex;gap:.7rem;flex-wrap:wrap;align-items:center;margin-top:1.6rem;padding-top:1.4rem;border-top:1px solid var(--line)}
    .empty{text-align:center;color:var(--muted);padding:4rem 1rem}
    .empty .em{font-size:2.4rem;margin-bottom:.6rem}

    /* ---------- admin editor ---------- */
    .editbar{display:none;align-items:center;gap:.7rem;flex-wrap:wrap;padding:.7rem 1.4rem;background:#2e1a2e;color:#fff}
    body.admin-edit .editbar{display:flex}
    body.admin-edit .layout{display:none}
    .editbar .save-note{font-size:.78rem;color:var(--lavender);margin-left:auto}
    .editor{display:none;padding:1.6rem clamp(1rem,4vw,2.4rem);max-width:1000px;margin:0 auto}
    body.admin-edit .editor{display:block}
    .ed-field{margin-bottom:1rem}
    .ed-field label{display:block;font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:.35rem;font-weight:600}
    .ed-field input,.ed-field textarea,.ed-field select{width:100%;padding:.65rem .85rem;border:1.5px solid var(--lavender);border-radius:10px;font-family:inherit;font-size:.92rem;color:var(--text);background:var(--white);outline:none}
    .ed-field input:focus,.ed-field textarea:focus,.ed-field select:focus{border-color:var(--purple)}
    .ed-field textarea{min-height:120px;resize:vertical;line-height:1.5}
    .ed-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
    .ed-module{background:var(--white);border:1px solid var(--line);border-radius:16px;padding:1.1rem;margin-bottom:1.1rem}
    .ed-module-head{display:flex;align-items:center;gap:.6rem;margin-bottom:.8rem}
    .ed-module-head input{font-weight:600}
    .ed-lesson{background:var(--blush);border-radius:12px;padding:.9rem;margin-bottom:.7rem}
    .ed-lesson-top{display:flex;align-items:center;gap:.5rem;margin-bottom:.6rem}
    .ed-lesson-top .ltag{font-size:.66rem;text-transform:uppercase;letter-spacing:.06em;color:var(--mid);font-weight:600}
    .ed-actions{display:flex;gap:.35rem;margin-left:auto}
    .icon-btn{border:1px solid var(--line);background:var(--white);color:var(--mid);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:.85rem;display:inline-flex;align-items:center;justify-content:center}
    .icon-btn:hover{background:var(--lavender);color:#fff;border-color:var(--lavender)}
    .icon-btn.del:hover{background:var(--err);border-color:var(--err)}
    .uploadrow{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;margin-top:.4rem}
    .hint{font-size:.74rem;color:var(--muted);margin-top:.3rem;line-height:1.45}
    .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--deep);color:#fff;padding:.7rem 1.3rem;border-radius:100px;font-size:.85rem;opacity:0;transition:.3s;z-index:600;box-shadow:0 10px 30px rgba(0,0,0,.25)}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .toast.err{background:var(--err)}

    @media(max-width:820px){
      .layout{grid-template-columns:1fr}
      .side{position:static;max-height:none;border-right:none;border-bottom:1px solid var(--line)}
      .main{max-height:none}
      .ed-row{grid-template-columns:1fr}
    }
  </style>
</head>
<body>

<!-- gate / loading -->
<div id="gate">
  <div class="spinner" id="gate-spin"></div>
  <p id="gate-msg">Loading your portal…</p>
  <a id="gate-login" class="btn" href="/login.html?next=portal.html" style="display:none">Log in to continue →</a>
</div>

<!-- app -->
<div id="app">
  <div class="topbar">
    <div class="brand">
      <span id="brand-logo"></span>
      <span class="sub">Portal</span>
    </div>
    <div class="tools">
      <span class="who" id="who"></span>
      <button class="btn ghost sm" id="admin-toggle" style="display:none"> Admin</button>
      <button class="btn ghost sm" id="logout">Log out</button>
    </div>
  </div>

  <!-- admin edit toolbar -->
  <div class="editbar">
    <button class="btn sm" id="add-module">+ Add module</button>
    <button class="btn ghost sm" id="exit-edit" style="color:#fff;border-color:rgba(255,255,255,.3)">Done editing</button>
    <span class="save-note" id="save-note">All changes saved</span>
    <button class="btn sm" id="save-btn">Save changes</button>
  </div>

  <!-- student layout -->
  <div class="layout">
    <aside class="side">
      <h1 id="course-title">Portal</h1>
      <p class="intro" id="course-intro"></p>
      <div class="progress-wrap">
        <div class="progress-bar"><span id="progress-fill"></span></div>
        <div class="progress-label" id="progress-label">0% complete</div>
      </div>
      <div id="module-list"></div>
    </aside>
    <main class="main">
      <div class="viewer" id="viewer"></div>
    </main>
  </div>

  <!-- admin editor -->
  <div class="editor" id="editor"></div>
</div>

<div class="toast" id="toast"></div>

<script src="/gc-experience.js" defer></script>
<script>
(function(){
  "use strict";
  var TOKEN = localStorage.getItem('gc_token');
  var EMAIL = localStorage.getItem('gc_email') || '';
  var state = { curriculum:null, isAdmin:false, storage:'none', current:null, dirty:false };
  var PROGRESS_KEY = 'gc_portal_progress';

  // ---------- helpers ----------
  function $(s,r){return (r||document).querySelector(s);}
  function el(tag,cls,html){var e=document.createElement(tag);if(cls)e.className=cls;if(html!=null)e.innerHTML=html;return e;}
  function id(){return 'x'+Math.random().toString(36).slice(2,9);}
  function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
  function toast(msg,isErr){var t=$('#toast');t.textContent=msg;t.className='toast show'+(isErr?' err':'');setTimeout(function(){t.className='toast';},2600);}

  function getProgress(){try{return JSON.parse(localStorage.getItem(PROGRESS_KEY)||'{}');}catch(e){return {};}}
  function setDone(lid,done){var p=getProgress();if(done)p[lid]=1;else delete p[lid];localStorage.setItem(PROGRESS_KEY,JSON.stringify(p));}
  function isDone(lid){return !!getProgress()[lid];}

  // tiny, safe markdown-ish renderer for lesson text
  function renderText(raw){
    var blocks = String(raw||'').split(/\n{2,}/);
    return blocks.map(function(b){
      var h = esc(b)
        .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
        .replace(/(^|[^*])\*([^*]+)\*/g,'$1<em>$2</em>')
        .replace(/`([^`]+)`/g,'<code>$1</code>')
        .replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>')
        .replace(/\n/g,'<br>');
      return '<p>'+h+'</p>';
    }).join('');
  }

  // turn a pasted URL into an embeddable player src
  function embedSrc(url){
    url = String(url||'').trim();
    var yt = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|live\/|shorts\/))([\w-]{6,})/);
    if(yt) return {type:'iframe', src:'https://www.youtube.com/embed/'+yt[1]};
    var vm = url.match(/vimeo\.com\/(?:video\/)?(\d+)/);
    if(vm) return {type:'iframe', src:'https://player.vimeo.com/video/'+vm[1]};
    var gd = url.match(/drive\.google\.com\/file\/d\/([\w-]+)/);
    if(gd) return {type:'iframe', src:'https://drive.google.com/file/d/'+gd[1]+'/preview'};
    var loom = url.match(/loom\.com\/share\/([\w-]+)/);
    if(loom) return {type:'iframe', src:'https://www.loom.com/embed/'+loom[1]};
    if(/\.(mp4|webm|ogg|mov)(\?.*)?$/i.test(url)) return {type:'video', src:url};
    return {type:'iframe', src:url};
  }
  function pdfSrc(url){
    url=String(url||'').trim();
    var gd=url.match(/drive\.google\.com\/file\/d\/([\w-]+)/);
    if(gd) return 'https://drive.google.com/file/d/'+gd[1]+'/preview';
    return url;
  }

  function allLessons(){var out=[];(state.curriculum.modules||[]).forEach(function(m){(m.lessons||[]).forEach(function(l){out.push(l);});});return out;}

  // ---------- API ----------
  function api(path,bodyObj){
    return fetch('/api/'+path,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify(Object.assign({token:TOKEN},bodyObj||{}))})
      .then(function(r){return r.json().then(function(d){return {ok:r.ok,d:d};});});
  }

  // ---------- boot ----------
  function boot(){
    if(!TOKEN){ showGateLogin('Please log in to open your revision portal.'); return; }
    api('portal-data',{}).then(function(res){
      if(!res.ok){
        if(res.d && /authoris/i.test(res.d.error||'')) showGateLogin('Your session expired. Please log in again.');
        else showGateError(res.d&&res.d.error||'Could not load the portal.');
        return;
      }
      state.curriculum = res.d.curriculum || {modules:[]};
      if(!Array.isArray(state.curriculum.modules)) state.curriculum.modules=[];
      state.isAdmin = !!res.d.isAdmin;
      state.storage = res.d.storage;
      startApp();
    }).catch(function(){ showGateError('Network error. Please refresh.'); });
  }
  function showGateLogin(msg){ $('#gate-spin').style.display='none'; $('#gate-msg').textContent=msg; $('#gate-login').style.display='inline-block'; }
  function showGateError(msg){ $('#gate-spin').style.display='none'; $('#gate-msg').textContent=msg; $('#gate-login').textContent='Back to login →'; $('#gate-login').style.display='inline-block'; }

  function startApp(){
    $('#gate').style.display='none';
    $('#app').style.display='block';
    $('#brand-logo').innerHTML = window.gcAnimatedLogo ? window.gcAnimatedLogo({height:34}) : '<img src="/gcourses-logo.png" style="height:34px">';
    $('#who').textContent = EMAIL;
    if(state.isAdmin){
      var b=el('span','badge','Admin'); $('#who').after(b);
      $('#admin-toggle').style.display='inline-block';
    }
    renderSidebar();
    // open first lesson, or empty state
    var first = allLessons()[0];
    if(first) openLesson(first.id); else renderEmpty();
    wireChrome();
  }

  // ---------- sidebar ----------
  function renderSidebar(){
    var c=state.curriculum;
    $('#course-title').textContent = c.title || 'Portal';
    $('#course-intro').textContent = c.intro || '';
    var list=$('#module-list'); list.innerHTML='';
    var lessons=allLessons(), done=lessons.filter(function(l){return isDone(l.id);}).length;
    var pct = lessons.length? Math.round(done/lessons.length*100):0;
    $('#progress-fill').style.width=pct+'%';
    $('#progress-label').textContent = pct+'% complete · '+done+'/'+lessons.length+' lessons';

    if(!c.modules.length){ list.innerHTML='<p class="hint">No modules yet.'+(state.isAdmin?' Click <strong> Admin</strong> to add the first one.':' Check back soon!')+'</p>'; return; }

    c.modules.forEach(function(m){
      var mod=el('div','module');
      var head=el('div','module-head');
      head.innerHTML='<span class="chev">▾</span><span class="mtitle">'+esc(m.title||'Untitled module')+'</span><span class="mcount">'+(m.lessons||[]).length+'</span>';
      head.addEventListener('click',function(){mod.classList.toggle('collapsed');});
      mod.appendChild(head);
      var ll=el('div','lessons');
      (m.lessons||[]).forEach(function(l){
        var it=el('div','lesson'+(isDone(l.id)?' done':'')+(state.current===l.id?' active':''));
        it.dataset.id=l.id;
        it.innerHTML='<span class="tick">✓</span><span class="ltype">'+esc(typeLabel(l.type))+'</span><span class="ltitle">'+esc(l.title||'Untitled')+'</span>';
        it.addEventListener('click',function(){openLesson(l.id);});
        ll.appendChild(it);
      });
      mod.appendChild(ll);
      list.appendChild(mod);
    });
  }
  function typeLabel(t){return ({video:'▶ Video',pdf:'PDF',text:'Notes',link:'Link'})[t]||'Notes';}

  // ---------- viewer ----------
  function findLesson(lid){var f=null;state.curriculum.modules.forEach(function(m){(m.lessons||[]).forEach(function(l){if(l.id===lid){f={l:l,m:m};}});});return f;}

  function openLesson(lid){
    var hit=findLesson(lid); if(!hit) return;
    state.current=lid;
    var l=hit.l, m=hit.m, v=$('#viewer');
    var body='';
    if(l.type==='video'){
      var e=embedSrc(l.url);
      body = '<div class="embed">'+(e.type==='video'
        ? '<video src="'+esc(e.src)+'" controls playsinline></video>'
        : '<iframe src="'+esc(e.src)+'" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture;fullscreen" allowfullscreen></iframe>')+'</div>';
    } else if(l.type==='pdf'){
      if(l.url) body='<iframe class="pdfframe" src="'+esc(pdfSrc(l.url))+'"></iframe>'+
        '<div class="filebar"><a class="btn ghost sm" href="'+esc(l.url)+'" target="_blank" rel="noopener">Open / download PDF ↗</a></div>';
      else body='<p class="hint">No PDF attached yet.</p>';
    } else if(l.type==='link'){
      body='<div class="filebar"><a class="btn" href="'+esc(l.url)+'" target="_blank" rel="noopener">Open resource ↗</a></div>';
    }
    var notes = l.text ? '<div class="richtext">'+renderText(l.text)+'</div>' : '';
    var done=isDone(l.id);
    v.innerHTML =
      '<div class="crumb">'+esc(m.title||'')+'</div>'+
      '<h2>'+esc(l.title||'Untitled')+'</h2>'+
      (l.description?'<p class="ldesc">'+esc(l.description)+'</p>':'')+
      body + notes +
      '<div class="lesson-actions">'+
        '<button class="btn'+(done?' ghost':'')+'" id="mark-done">'+(done?'✓ Completed — undo':'Mark as complete')+'</button>'+
        navBtns(lid)+
      '</div>';
    $('#mark-done').addEventListener('click',function(){ setDone(l.id,!isDone(l.id)); openLesson(l.id); renderSidebar(); });
    var pv=$('#prev-l'), nx=$('#next-l');
    if(pv)pv.addEventListener('click',function(){openLesson(pv.dataset.id);});
    if(nx)nx.addEventListener('click',function(){openLesson(nx.dataset.id);});
    renderSidebar();
    $('.main').scrollTop=0;
  }
  function navBtns(lid){
    var arr=allLessons(), i=arr.findIndex(function(l){return l.id===lid;});
    var out='';
    if(i>0) out+='<button class="btn ghost sm" id="prev-l" data-id="'+arr[i-1].id+'">← Previous</button>';
    if(i<arr.length-1) out+='<button class="btn ghost sm" id="next-l" data-id="'+arr[i+1].id+'">Next →</button>';
    return out;
  }
  function renderEmpty(){
    $('#viewer').innerHTML='<div class="empty"><div class="em"></div><p>'+
      (state.isAdmin?'Your portal is empty. Hit <strong> Admin</strong> in the top bar to add your first module, recording, PDF or note.'
                    :'Your tutor is still setting things up. Check back soon — Gigi will let you know when it’s ready!')+'</p></div>';
  }

  // ---------- chrome wiring ----------
  function wireChrome(){
    $('#logout').addEventListener('click',function(){localStorage.removeItem('gc_token');localStorage.removeItem('gc_email');location.href='/index.html';});
    $('#admin-toggle').addEventListener('click',function(){document.body.classList.add('admin-edit');renderEditor();});
    $('#exit-edit').addEventListener('click',function(){ if(state.dirty && !confirm('You have unsaved changes. Leave the editor anyway?'))return; document.body.classList.remove('admin-edit'); renderSidebar(); var c=state.current||(allLessons()[0]&&allLessons()[0].id); if(c)openLesson(c); else renderEmpty(); });
    $('#add-module').addEventListener('click',function(){ state.curriculum.modules.push({id:id(),title:'New module',lessons:[]}); markDirty(); renderEditor(); });
    $('#save-btn').addEventListener('click',saveAll);
  }
  function markDirty(){ state.dirty=true; $('#save-note').textContent='Unsaved changes'; }
  function markClean(){ state.dirty=false; $('#save-note').textContent='All changes saved'; }

  function saveAll(){
    var btn=$('#save-btn'); btn.disabled=true; btn.textContent='Saving…';
    // sync title/intro fields
    state.curriculum.title = $('#ed-title').value.trim()||'Portal';
    state.curriculum.intro = $('#ed-intro').value.trim();
    api('portal-save',{curriculum:state.curriculum}).then(function(res){
      btn.disabled=false; btn.textContent='Save changes';
      if(res.ok&&res.d.success){ markClean(); toast('Saved ✓'); }
      else toast(res.d&&res.d.error||'Could not save',true);
    }).catch(function(){ btn.disabled=false; btn.textContent='Save changes'; toast('Network error',true); });
  }

  // ---------- admin editor ----------
  function renderEditor(){
    var c=state.curriculum, ed=$('#editor');
    ed.innerHTML=
      '<div class="ed-row">'+
        '<div class="ed-field"><label>Portal title</label><input id="ed-title" value="'+esc(c.title||'')+'"></div>'+
        '<div class="ed-field"><label>Intro / welcome</label><input id="ed-intro" value="'+esc(c.intro||'')+'"></div>'+
      '</div>';
    $('#ed-title').addEventListener('input',markDirty);
    $('#ed-intro').addEventListener('input',markDirty);

    c.modules.forEach(function(m,mi){ ed.appendChild(moduleEditor(m,mi)); });
    if(!c.modules.length) ed.appendChild(el('p','hint','No modules yet — click “+ Add module” above to begin.'));
  }

  function moduleEditor(m,mi){
    var box=el('div','ed-module');
    var head=el('div','ed-module-head');
    var ti=el('input'); ti.value=m.title||''; ti.placeholder='Module title';
    ti.addEventListener('input',function(){m.title=ti.value;markDirty();});
    head.appendChild(ti);
    var acts=el('div','ed-actions');
    acts.appendChild(iconBtn('↑','Move up',function(){move(state.curriculum.modules,mi,-1);renderEditor();}));
    acts.appendChild(iconBtn('↓','Move down',function(){move(state.curriculum.modules,mi,1);renderEditor();}));
    acts.appendChild(iconBtn('✕','Delete module',function(){if(confirm('Delete this module and all its lessons?')){state.curriculum.modules.splice(mi,1);markDirty();renderEditor();}},'del'));
    head.appendChild(acts);
    box.appendChild(head);

    (m.lessons||[]).forEach(function(l,li){ box.appendChild(lessonEditor(m,l,li)); });

    var add=el('button','btn ghost sm','+ Add lesson');
    add.style.marginTop='.4rem';
    add.addEventListener('click',function(){ m.lessons=m.lessons||[]; m.lessons.push({id:id(),type:'video',title:'New lesson',url:'',text:'',description:''}); markDirty(); renderEditor(); });
    box.appendChild(add);
    return box;
  }

  function lessonEditor(m,l,li){
    var box=el('div','ed-lesson');
    var top=el('div','ed-lesson-top');
    var sel=el('select');
    ['video','pdf','text','link'].forEach(function(t){var o=el('option',null,({video:'▶ Recording / video',pdf:'PDF document',text:'Notes / text',link:'External link'})[t]);o.value=t;if(l.type===t)o.selected=true;sel.appendChild(o);});
    sel.style.maxWidth='200px';
    sel.addEventListener('change',function(){l.type=sel.value;markDirty();renderEditor();});
    top.appendChild(sel);
    var acts=el('div','ed-actions');
    acts.appendChild(iconBtn('↑','Move up',function(){move(m.lessons,li,-1);renderEditor();}));
    acts.appendChild(iconBtn('↓','Move down',function(){move(m.lessons,li,1);renderEditor();}));
    acts.appendChild(iconBtn('✕','Delete lesson',function(){if(confirm('Delete this lesson?')){m.lessons.splice(li,1);markDirty();renderEditor();}},'del'));
    top.appendChild(acts);
    box.appendChild(top);

    box.appendChild(field('Title',inputFor(l,'title','e.g. Cell Respiration — recap')));
    box.appendChild(field('Short description (optional)',inputFor(l,'description','One line shown under the title')));

    if(l.type==='video'){
      box.appendChild(field('Recording link (YouTube, Vimeo, Loom, Drive, or .mp4)',inputFor(l,'url','https://youtu.be/…')));
    } else if(l.type==='pdf'){
      var f1=field('PDF link (Drive, Dropbox, or direct .pdf)',inputFor(l,'url','https://…'));
      f1.appendChild(uploadWidget(l,'application/pdf,.pdf'));
      box.appendChild(f1);
    } else if(l.type==='link'){
      box.appendChild(field('Resource URL',inputFor(l,'url','https://…')));
    }
    if(l.type==='text' || l.type==='video' || l.type==='pdf'){
      var lbl = l.type==='text' ? 'Notes (supports **bold**, *italics*, `code`, and links)' : 'Notes shown below (optional)';
      box.appendChild(field(lbl,textareaFor(l,'text')));
    }
    return box;
  }

  function uploadWidget(l,accept){
    var wrap=el('div','uploadrow');
    if(state.storage!=='kv'){ /* upload still allowed; needs blob token server-side */ }
    var inp=el('input'); inp.type='file'; inp.accept=accept; inp.style.display='none';
    var btn=el('button','btn ghost sm','Upload file'); btn.type='button';
    var stat=el('span','hint'); stat.style.marginTop='0';
    btn.addEventListener('click',function(){inp.click();});
    inp.addEventListener('change',function(){
      var file=inp.files[0]; if(!file)return;
      if(file.size>4*1024*1024){ stat.textContent='That file is over 4 MB — please use a Drive/Dropbox link instead.'; return; }
      stat.textContent='Uploading…';
      var rd=new FileReader();
      rd.onload=function(){
        var b64=String(rd.result).split(',')[1];
        api('portal-upload',{filename:file.name,contentType:file.type,dataBase64:b64}).then(function(res){
          if(res.ok&&res.d.url){ l.url=res.d.url; markDirty(); renderEditor(); }
          else stat.textContent=(res.d&&res.d.error)||'Upload failed.';
        }).catch(function(){stat.textContent='Upload failed.';});
      };
      rd.readAsDataURL(file);
    });
    wrap.appendChild(btn); wrap.appendChild(inp); wrap.appendChild(stat);
    return wrap;
  }

  // editor field builders
  function field(label,control){var f=el('div','ed-field');f.appendChild(el('label',null,esc(label)));f.appendChild(control);return f;}
  function inputFor(obj,key,ph){var i=el('input');i.value=obj[key]||'';if(ph)i.placeholder=ph;i.addEventListener('input',function(){obj[key]=i.value;markDirty();});return i;}
  function textareaFor(obj,key){var t=el('textarea');t.value=obj[key]||'';t.addEventListener('input',function(){obj[key]=t.value;markDirty();});return t;}
  function iconBtn(label,title,fn,extra){var b=el('button','icon-btn'+(extra?' '+extra:''),label);b.type='button';b.title=title;b.addEventListener('click',fn);return b;}
  function move(arr,i,dir){var j=i+dir;if(j<0||j>=arr.length)return;var t=arr[i];arr[i]=arr[j];arr[j]=t;markDirty();}

  window.addEventListener('beforeunload',function(e){ if(state.dirty){e.preventDefault();e.returnValue='';} });

  boot();
})();
</script>
</body>
</html>
